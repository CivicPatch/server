services:
  pipelines-cicd:
    environment:
      - GOOGLE_GEMINI_TOKEN
      - OPEN_ROUTER_TOKEN

      - CIVICPATCH_ORG_URL
      - SERVICE_API_KEY

      - JOB_RUN_URL

      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - APP_ROOT=/app
    init: true # https://stackoverflow.com/questions/50634819/xvfb-run-hangs-in-container
    image: ghcr.io/civicpatch/pipelines:latest
    #build:
    #  context: .
    #  dockerfile: Dockerfile.github-actions
    #network_mode: host
    volumes:
      - ./data:/app/data
      - ./data_source:/app/data_source
