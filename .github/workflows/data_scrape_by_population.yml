name: "[manual] - Data Scrape by Population"

on:
  workflow_dispatch:
    inputs:
      state:
        description: "State initials (e.g. co, wa)"
        required: true
        type: choice
        options:
          - co
          - mi
          - nj
          - wa
          - tx
      num_jurisdictions:
        description: "Number of jurisdictions to scrape"
        required: false
        default: "10"
        type: string

jobs:
  fetch-jurisdictions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    timeout-minutes: 5
    steps:
      - name: Register batch jobs
        id: set-matrix
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
          CIVICPATCH_ORG_URL: https://civicpatch.org
        run: |
          RESPONSE=$(curl -s --fail-with-body -X POST "${CIVICPATCH_ORG_URL}/api/v1/jobs/batch" \
            -H "Authorization: ${SERVICE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$(jq -n \
              --arg state "${{ github.event.inputs.state }}" \
              --argjson num "${{ github.event.inputs.num_jurisdictions }}" \
              '{state: $state, num_jurisdictions: $num}')")
          echo "matrix=$(echo "$RESPONSE" | jq -c '.jurisdictions')" >> $GITHUB_OUTPUT

  scrape:
    needs: fetch-jurisdictions
    strategy:
      matrix:
        jurisdiction: ${{ fromJson(needs.fetch-jurisdictions.outputs.matrix) }}
      fail-fast: false
    uses: ./.github/workflows/data_scrape.yml
    with:
      jurisdiction_ocdid: ${{ matrix.jurisdiction.jurisdiction_ocdid }}
      name: ${{ matrix.jurisdiction.name }}
      url: ${{ matrix.jurisdiction.url }}
      request_id: ${{ matrix.jurisdiction.request_id }}
    secrets: inherit
