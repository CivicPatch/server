name: "[manual] - Data Scrape by Population"

on:
  workflow_dispatch:
    inputs:
      state:
        description: "State initials (e.g. co, wa)"
        required: true
        type: choice
        options:
          - co
          - nj
          - wa
          - tx
      num_jurisdictions:
        description: "Number of jurisdictions to scrape by population (e.g. 10 for top 10)"
        required: false
        default: 10
        type: number

jobs:
  fetch-jurisdictions:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    timeout-minutes: 5

    steps:
      - name: Fetch jurisdictions
        id: find-jurisdictions
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
          CIVICPATCH_ORG_URL: https://civicpatch.org
        run: |
          TMP_FILE="$RUNNER_TEMP/jurisdictions.json"
          curl -sf -X GET "${CIVICPATCH_ORG_URL}/api/v1/jurisdictions/available?num_jurisdictions=${{ github.event.inputs.num_jurisdictions }}&state=${{ github.event.inputs.state }}" \
            -H "Authorization: ${SERVICE_API_KEY}" > "$TMP_FILE"
          jq -c '.jurisdictions[] | {id, name, url}' "$TMP_FILE" > "$RUNNER_TEMP/matrix.json"

      - name: Set matrix
        id: set-matrix
        run: |
          echo "matrix=$(jq -c -s '.' "$RUNNER_TEMP/matrix.json")" >> $GITHUB_OUTPUT

  create-jobs:
    needs: fetch-jurisdictions
    runs-on: ubuntu-latest
    timeout-minutes: 5
    strategy:
      matrix:
        jurisdiction: ${{ fromJson(needs.fetch-jurisdictions.outputs.matrix) }}
      fail-fast: false
    steps:
      - name: Create job for ${{ matrix.jurisdiction.name }}
        env:
          SERVICE_API_KEY: ${{ secrets.SERVICE_API_KEY }}
          CIVICPATCH_ORG_URL: https://civicpatch.org
          JURISDICTION_ID: ${{ matrix.jurisdiction.id }}
          JURISDICTION_NAME: ${{ matrix.jurisdiction.name }}
          JURISDICTION_URL: ${{ matrix.jurisdiction.url }}
        run: |
          PAYLOAD=$(jq -n \
            --arg ocdid "$JURISDICTION_ID" \
            --arg name "$JURISDICTION_NAME" \
            --arg url "$JURISDICTION_URL" \
            '{jurisdiction_ocdid: $ocdid, name: $name, url: $url, dispatch_mode: "remote"}')
          curl -sf -X POST "${CIVICPATCH_ORG_URL}/api/v1/jobs" \
            -H "Authorization: ${SERVICE_API_KEY}" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
